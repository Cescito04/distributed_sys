# Job to initialize database (run migrations and create superuser)
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-init-job
  labels:
    app: backend
    job: init
spec:
  template:
    metadata:
      labels:
        app: backend
        job: init
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
      - name: django-migrate
        image: cescito04/ecommerce-backend:latest
        imagePullPolicy: Never
        command:
        - /bin/sh
        - -c
        - |
          echo "Running database migrations..."
          python manage.py migrate --noinput
          echo "Creating superuser..."
          python create_superuser.py
          echo "Loading test data..."
          python load_test_data.py || echo "Test data already exists"
          echo "Initialization complete!"
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_DB
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DJANGO_SECRET_KEY

