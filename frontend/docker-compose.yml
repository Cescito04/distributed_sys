# Docker Compose configuration for Next.js e-commerce frontend
# Note: Backend should be running separately on port 8000
version: '3.8'

services:
  # Next.js frontend application service
  frontend:
    build: .
    ports:
      - "3000:3000"  # Expose frontend on port 3000
    environment:
      - NEXT_PUBLIC_API_URL=http://host.docker.internal:8000/api/v1  # Backend API URL (access host machine)
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allow container to access host services
