# Kubernetes Secret for sensitive data
# Note: In production, use proper secret management (Sealed Secrets, External Secrets, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  labels:
    app: ecommerce
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "ecommerce_db"
  
  # Django secret key
  DJANGO_SECRET_KEY: "django-insecure-k8s-production-change-me-in-real-deployment"
  
  # Database URL
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/ecommerce_db"

